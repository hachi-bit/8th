<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>案3: 提案評価タワーAR配置 | 8th Wall AR検証</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #000; font-family: sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  /* 実カメラ映像の縦横比を保ったまま画面に収まる最大サイズで中央表示するため、
     幅・高さはJS側(renderer.setSize)で都度設定し、位置は中央固定にする */
  #camerafeed { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); touch-action: none; background: #000; }

  /* 8th Wallエンジンが内部でカメラ映像を流し込むために生成する<video>要素は、
     以前はcanvasが画面いっぱいだったため隠れていたが、canvasを実寸レターボックス化した
     ことで画面端に覗いて見えるようになったため、明示的に非表示にする。
     display:noneにするとブラウザによっては映像の更新が止まる可能性があるため、
     視覚的にのみ消す(サイズを潰す・透明化する)方法をとっている。 */
  video { position: fixed !important; top: 0 !important; left: 0 !important; width: 1px !important; height: 1px !important; opacity: 0 !important; pointer-events: none !important; z-index: -1 !important; }

  .ui-text {
    position: fixed; left: 0; right: 0; text-align: center;
    color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.85);
    pointer-events: none; z-index: 10; padding: 0 16px; box-sizing: border-box;
  }
  #hint {
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    font-size: 15px; line-height: 1.4;
  }
  #status {
    bottom: calc(env(safe-area-inset-bottom, 0px) + 150px);
    font-size: 14px; line-height: 1.4;
  }

  #legend {
    position: fixed; left: 14px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    z-index: 10; color: #fff; font-size: 13px; line-height: 1.7;
    text-shadow: 0 1px 4px rgba(0,0,0,.85);
    background: rgba(0,0,0,.35); border-radius: 8px; padding: 8px 12px;
    pointer-events: none;
  }
  #legend .row { display: flex; align-items: center; gap: 6px; }
  #legend .swatch { width: 12px; height: 12px; border-radius: 2px; flex: none; }

  #buttons {
    position: fixed; right: 14px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    display: flex; flex-direction: column; gap: 8px; z-index: 20;
  }
  .btn {
    background: rgba(0,0,0,.55); color: #fff;
    border: 1px solid rgba(255,255,255,.4); border-radius: 8px;
    padding: 10px 18px; font-size: 14px; font-family: sans-serif;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }

  #error-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.92); color: #fff;
    z-index: 9999; display: none; align-items: center; justify-content: center;
    text-align: center; padding: 24px; box-sizing: border-box; font-family: sans-serif;
    line-height: 1.6; font-size: 15px;
  }
  #error-overlay.show { display: flex; }
</style>
</head>
<body>

<canvas id="camerafeed"></canvas>

<div id="hint" class="ui-text">床をタップすると評価タワーが実寸大で表示されます。周りを歩いて見てみてください</div>
<div id="status" class="ui-text">初期化中...</div>

<div id="legend">
  <div class="row"><span class="swatch" style="background:#4d94ff"></span>コスト/価値</div>
  <div class="row"><span class="swatch" style="background:#7CFC9A"></span>品質</div>
  <div class="row"><span class="swatch" style="background:#ffb84d"></span>スケジュール</div>
  <div class="row"><span class="swatch" style="background:#ff6b6b"></span>実績</div>
</div>

<div id="buttons">
  <button class="btn" id="recenter-btn">Recenter</button>
</div>

<div id="error-overlay"><div id="error-msg"></div></div>

<!-- 00-common-setup.md 3節: three.jsを必ず8th Wallエンジンより先に読み込む -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>

<script>
(function () {
  'use strict';

  function showFatalError(msg) {
    var overlay = document.getElementById('error-overlay');
    document.getElementById('error-msg').textContent = msg;
    overlay.classList.add('show');
  }

  var isSecureContext = window.location.protocol === 'https:' ||
    window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
  if (!isSecureContext) {
    showFatalError('このデモにはHTTPS接続が必要です。https:// で始まるURLでアクセスしてください。');
  }

  var xr8LoadTimer = setTimeout(function () {
    if (!window.XR8) {
      showFatalError('ARエンジンの読み込みに失敗しました。通信環境を確認し、ページを再読み込みしてください。');
    }
  }, 15000);

  function setStatus(text) {
    var el = document.getElementById('status');
    if (el) el.textContent = text;
  }

  // 精度検証用: onStartで設定される。ヒットテスト結果とカメラ位置の距離をログに出すために使う。
  var currentCamera = null;

  // 00-common-setup.md 3.4節: 共通ヒットテスト関数
  function hitTestAtScreenPoint(clientX, clientY) {
    var x = clientX / window.innerWidth;
    var y = clientY / window.innerHeight;
    // 要検証(00-common-setup.md 6-2): hitTest()の戻り値の座標系は実機ログで未確認。
    var results = XR8.XrController.hitTest(x, y, ['FEATURE_POINT']);
    if (!results || results.length === 0) {
      console.log('[hitTest] miss', { clientX: clientX, clientY: clientY, normX: x, normY: y });
      return null;
    }
    var pos = results[0].position;
    var logInfo = {
      clientX: clientX, clientY: clientY, normX: x, normY: y,
      resultCount: results.length,
      position: { x: pos.x, y: pos.y, z: pos.z },
      allResults: results.map(function (r) { return { x: r.position.x, y: r.position.y, z: r.position.z }; }),
    };
    if (currentCamera) {
      var cp = currentCamera.position;
      logInfo.cameraPosition = { x: cp.x, y: cp.y, z: cp.z };
      logInfo.distanceFromCamera = Math.sqrt(
        Math.pow(pos.x - cp.x, 2) + Math.pow(pos.y - cp.y, 2) + Math.pow(pos.z - cp.z, 2)
      );
    }
    console.log('[hitTest] hit', logInfo);
    return pos;
  }

  // 03-proposal-tower-ar.md 3節: サンプルスコア(ハードコード、実データ連携はスコープ外)
  var SCORES = {
    cost: 0.7,
    quality: 0.85,
    schedule: 0.55,
    track: 0.9,
  };
  var COLORS = {
    cost: 0x4d94ff,
    quality: 0x7CFC9A,
    schedule: 0xffb84d,
    track: 0xff6b6b,
  };
  var AXIS_ORDER = ['cost', 'quality', 'schedule', 'track'];
  var TOWER_MAX_HEIGHT = 1.2;

  function buildTower() {
    var group = new THREE.Group();

    // 台座
    var baseHeight = 0.02;
    var baseGeometry = new THREE.CylinderGeometry(0.205, 0.205, baseHeight, 32);
    var baseMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
    var base = new THREE.Mesh(baseGeometry, baseMaterial);
    base.position.y = baseHeight / 2;
    group.add(base);

    // 4軸セグメント(下から cost -> quality -> schedule -> track)
    var unitHeightPerScore = TOWER_MAX_HEIGHT / AXIS_ORDER.length; // 満点合計(4)で割った単位
    var currentY = baseHeight;
    AXIS_ORDER.forEach(function (axis) {
      var score = SCORES[axis];
      var segmentHeight = Math.max(unitHeightPerScore * score, 0.001);
      var geometry = new THREE.CylinderGeometry(0.12, 0.12, segmentHeight, 32);
      var material = new THREE.MeshStandardMaterial({ color: COLORS[axis] });
      var segment = new THREE.Mesh(geometry, material);
      segment.position.y = currentY + segmentHeight / 2;
      group.add(segment);
      currentY += segmentHeight;
    });

    // 総合スコア球(タワー最上部から0.1m浮かせる)
    var overall = (SCORES.cost + SCORES.quality + SCORES.schedule + SCORES.track) / 4;
    var sphereRadius = 0.06 + overall * 0.05;
    var sphereGeometry = new THREE.SphereGeometry(sphereRadius, 24, 24);
    var sphereMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0x333333,
    });
    var sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphere.position.y = currentY + 0.1;
    group.add(sphere);

    return group;
  }

  var sceneModule = {
    name: 'proposaltowerar',
    onStart: function () {
      clearTimeout(xr8LoadTimer);
      var xrScene = XR8.Threejs.xrScene();
      var scene = xrScene.scene;
      var camera = xrScene.camera;
      var renderer = xrScene.renderer;
      camera.position.set(0, 1.4, 0);
      currentCamera = camera;

      // カメラ映像/three.jsレンダラーが画面全体を覆わない不具合対策として、以前は画面いっぱいに
      // 引き伸ばしていたが、それだと実際のカメラセンサーの縦横比と画面の縦横比が一致しない場合に
      // 映像がクロップされ「ズームしたように」見えてしまう。そのため、実際のカメラ映像の解像度を
      // DOM上の<video>要素から検出し、その縦横比を保ったまま画面に収まる最大サイズで表示する
      // (収まりきらない方向は黒帯になる)。
      //
      // 要検証: 8th Wallエンジンが内部でカメラ映像を流し込む<video>要素をDOM上に生成している、
      // という前提で実装している。この前提が崩れる場合は検出できず、画面いっぱいの表示にフォールバックする。
      var nativeAspect = null;

      function findCameraVideoElement() {
        var videos = document.getElementsByTagName('video');
        for (var i = 0; i < videos.length; i++) {
          if (videos[i].videoWidth > 0 && videos[i].videoHeight > 0) return videos[i];
        }
        return null;
      }

      function detectNativeAspect() {
        var video = findCameraVideoElement();
        if (!video) return null;
        var vw = video.videoWidth;
        var vh = video.videoHeight;
        // カメラセンサーはセンサー本来の向き(横向き基準)の解像度を返すことが多いため、
        // 画面の向きと矛盾する場合は縦横を入れ替えて実際に表示される向きに合わせる。
        var sensorIsLandscape = vw > vh;
        var screenIsPortrait = window.innerHeight >= window.innerWidth;
        var aspect = (sensorIsLandscape === screenIsPortrait) ? (vh / vw) : (vw / vh);
        console.log('[camera] detected native video resolution', {
          videoWidth: vw, videoHeight: vh, screenIsPortrait: screenIsPortrait, computedAspect: aspect,
        });
        return aspect;
      }

      function resizeToWindow() {
        var windowWidth = window.innerWidth;
        var windowHeight = window.innerHeight;
        var displayWidth = windowWidth;
        var displayHeight = windowHeight;
        if (nativeAspect) {
          var windowAspect = windowWidth / windowHeight;
          if (windowAspect > nativeAspect) {
            displayHeight = windowHeight;
            displayWidth = Math.round(displayHeight * nativeAspect);
          } else {
            displayWidth = windowWidth;
            displayHeight = Math.round(displayWidth / nativeAspect);
          }
        }
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        renderer.setSize(displayWidth, displayHeight);
        camera.aspect = displayWidth / displayHeight;
        camera.updateProjectionMatrix();
        // 要検証: 8th Wall内部のカメラ描画ループとリサイズのタイミングがずれると、
        // バッファが正しくクリアされず3D描画が残像として残ることがあったため、
        // リサイズ直後に明示的にクリアする。
        renderer.clear();
      }
      resizeToWindow();
      window.addEventListener('resize', resizeToWindow);
      window.addEventListener('orientationchange', function () {
        nativeAspect = null; // 向きが変わるとセンサーの見え方の前提も変わるため再検出する
        setTimeout(function () {
          nativeAspect = detectNativeAspect();
          // 要検証: 8th Wallの描画フレームの合間で呼ぶことで内部状態とのズレを減らせないか試している
          requestAnimationFrame(resizeToWindow);
        }, 300);
      });

      // <video>要素は起動直後は存在しない/解像度未確定なことがあるため、見つかるまで断続的に試行する
      var aspectDetectAttempts = 0;
      var aspectDetectTimer = setInterval(function () {
        aspectDetectAttempts += 1;
        var aspect = detectNativeAspect();
        if (aspect) {
          nativeAspect = aspect;
          requestAnimationFrame(resizeToWindow);
          clearInterval(aspectDetectTimer);
        } else if (aspectDetectAttempts >= 50) {
          console.log('[camera] could not detect native video element after 10s; keeping full-screen fit');
          clearInterval(aspectDetectTimer);
        }
      }, 200);

      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      var directional = new THREE.DirectionalLight(0xffffff, 0.6);
      directional.position.set(1, 3, 1);
      scene.add(directional);

      setStatus('床をスキャン中です。カメラをゆっくり動かしてください');

      // 03-proposal-tower-ar.md 5.1節: 本デモでは1個だけ配置可能とする
      var placed = false;
      var placedTower = null;

      // ステータス表示を「今実際にタップすれば置けるかどうか」に合わせて更新するため、
      // 画面中央に向けて定期的にヒットテストを試す(ログを汚さないよう共通関数は使わず直接呼ぶ)。
      // 配置済みならタップ操作で状況は分かるはずなのでポーリングは停止する。
      var scanReady = false;
      var scanPollTimer = null;
      function startScanPolling() {
        scanReady = false;
        if (scanPollTimer) clearInterval(scanPollTimer);
        scanPollTimer = setInterval(function () {
          if (placed) {
            clearInterval(scanPollTimer);
            scanPollTimer = null;
            return;
          }
          var results = XR8.XrController.hitTest(0.5, 0.5, ['FEATURE_POINT']);
          var ready = !!(results && results.length > 0);
          if (ready !== scanReady) {
            scanReady = ready;
            setStatus(ready
              ? '平面を検出しました。タップして配置してください'
              : '床をスキャン中です。カメラをゆっくり動かしてください');
          }
        }, 500);
      }
      startScanPolling();

      function handleTap(clientX, clientY) {
        if (placed) return; // 2回目以降のタップは無視

        var pos = hitTestAtScreenPoint(clientX, clientY);
        if (!pos) {
          setStatus('平面が検出できませんでした。カメラをゆっくり動かして周囲をスキャンしてください');
          return;
        }

        placedTower = buildTower();
        placedTower.position.set(pos.x, pos.y, pos.z);
        scene.add(placedTower);
        placed = true;
        setStatus('配置が完了しました。周りを歩いて見てみてください');
      }

      var canvas = document.getElementById('camerafeed');
      canvas.addEventListener('touchstart', function (e) {
        if (e.touches.length === 1) {
          handleTap(e.touches[0].clientX, e.touches[0].clientY);
        }
      });
      canvas.addEventListener('click', function (e) {
        handleTap(e.clientX, e.clientY);
      });

      document.getElementById('recenter-btn').addEventListener('click', function () {
        // recenter()は原点を再定義するだけで、配置済みタワーの座標は補正されないため、
        // そのままだとタワーが全然違う場所に表示されてしまう。混乱を避けるため、
        // recenter実行時は配置済みタワーを消して再配置可能な状態に戻す。
        if (window.XR8 && XR8.XrController) {
          XR8.XrController.recenter();
          if (placedTower) {
            scene.remove(placedTower);
            placedTower.traverse(function (obj) {
              if (obj.geometry) obj.geometry.dispose();
              if (obj.material) obj.material.dispose();
            });
            placedTower = null;
          }
          placed = false;
          setStatus('原点をリセットしました。もう一度床をタップして配置してください');
          startScanPolling();
        }
      });
    },
  };

  var onxrloaded = function () {
    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      sceneModule,
    ]);
    XR8.run({ canvas: document.getElementById('camerafeed') });
  };

  window.addEventListener('load', function () {
    if (window.XR8) {
      onxrloaded();
    } else {
      window.addEventListener('xrloaded', onxrloaded);
    }
  });

  // 03-proposal-tower-ar.md 9節: マルチユーザーAR(複数人で同じタワーを共有)は
  // 8th Wallの現行の無償構成では非対応。将来的にVPS等の代替手段が必要になる可能性がある。
})();
</script>
</body>
</html>
